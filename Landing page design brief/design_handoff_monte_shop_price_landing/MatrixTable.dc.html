<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:#ffffff;border-radius:18px;border:1px solid #e3eee8;box-shadow:0 28px 64px -30px rgba(6,78,59,0.4);overflow:hidden;width:100%;font-family:'Plus Jakarta Sans',sans-serif;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #eef4f1;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="width:9px;height:9px;border-radius:999px;background:{{ accent }};display:inline-block;"></span>
      <span style="font-weight:700;font-size:17px;color:#0f3d2e;letter-spacing:-0.01em;">{{ t.tableTitle }}</span>
    </div>
    <span style="font-size:13px;color:#7d9a8d;font-family:'Space Grotesk',monospace;">{{ t.updated }}</span>
  </div>
  <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th style="text-align:left;padding:16px 22px;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#6b8a7d;font-weight:600;border-bottom:1px solid #d9e7df;background:#f6faf8;">{{ t.product }}</th>
          <sc-for list="{{ stores }}" as="s" hint-placeholder-count="4">
            <th style="text-align:right;padding:16px 18px;border-bottom:1px solid #d9e7df;background:#f6faf8;">
              <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
                <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;background:{{ s.color }};color:#fff;font-family:'Space Grotesk',monospace;font-size:12px;font-weight:700;">{{ s.initial }}</span>
                <span style="font-size:13px;font-weight:600;color:#33524a;">{{ s.name }}</span>
              </div>
            </th>
          </sc-for>
          <th style="text-align:right;padding:16px 22px;font-size:12px;letter-spacing:0.06em;text-transform:uppercase;color:#0b6e4f;font-weight:700;border-bottom:1px solid #cdeeda;background:#eafaf1;border-left:1px solid #e3eee8;">{{ t.cheapest }}</th>
        </tr>
      </thead>
      <tbody>
        <sc-for list="{{ rows }}" as="row" hint-placeholder-count="8">
          <tr>
            <td style="text-align:left;padding:15px 22px;border-bottom:1px solid #eef4f1;">
              <div style="font-weight:600;color:#0f3d2e;font-size:15px;">{{ row.name }}</div>
              <div style="font-size:12px;color:#94aea3;font-family:'Space Grotesk',monospace;margin-top:2px;">{{ row.unit }}</div>
            </td>
            <sc-for list="{{ row.cells }}" as="cell" hint-placeholder-count="4">
              <sc-if value="{{ cell.cheapest }}" hint-placeholder-val="{{ true }}">
                <td style="text-align:right;padding:15px 18px;border-bottom:1px solid #eef4f1;font-family:'Space Grotesk',monospace;font-size:15px;font-weight:700;color:#05603a;background:#d8f3e3;font-variant-numeric:tabular-nums;box-shadow:inset 3px 0 0 {{ accent }};">{{ cell.priceText }}</td>
              </sc-if>
              <sc-if value="{{ cell.normal }}" hint-placeholder-val="{{ true }}">
                <td style="text-align:right;padding:15px 18px;border-bottom:1px solid #eef4f1;font-family:'Space Grotesk',monospace;font-size:15px;color:#52736a;font-variant-numeric:tabular-nums;">{{ cell.priceText }}</td>
              </sc-if>
            </sc-for>
            <td style="text-align:right;padding:13px 22px;border-bottom:1px solid #eef4f1;border-left:1px solid #f0f5f2;background:#fafdfb;">
              <div style="font-family:'Space Grotesk',monospace;font-size:17px;font-weight:700;color:{{ accent }};font-variant-numeric:tabular-nums;">{{ row.best.priceText }}</div>
              <div style="font-size:11px;color:#94aea3;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;">{{ row.best.storeName }}</div>
            </td>
          </tr>
        </sc-for>
      </tbody>
    </table>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:580},&quot;rows&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any[]&quot;},&quot;stores&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any[]&quot;},&quot;t&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#0b6e4f&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
